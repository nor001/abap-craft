<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title | default: "Redirecting..." }}</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.redirect_to }}">
  <script>window.location.replace({{ page.redirect_to | relative_url | jsonify }});</script>
</head>
<body>
  <p>Redirecting to <a href="{{ page.redirect_to | relative_url }}">{{ page.redirect_to | relative_url }}</a>.</p>
</body>
</html>
